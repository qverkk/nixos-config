# Script directory defaults to $HOME/.config/tmux/scripts (works on macOS and any non-Nix install).
# On NixOS/Home Manager, home.nix replaces this literal with the Nix-computed xdg.configHome path.

# --- Options (terminal / nvim-friendly) ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

set -s escape-time 0
set -g focus-events on
set -g mouse on
set -g mode-keys vi
set -g history-limit 8192

set -g set-clipboard on

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Appearance ---
set -g status-position bottom
set -g status on
set -g status-justify left
set -g status-interval 1

set -g status-style "fg=#f2f4f8,bg=black"
set -g message-style "fg=#f2f4f8,bg=#353535"
set -g pane-border-style "fg=#353535"
set -g pane-active-border-style "fg=#78a9ff"

setw -g window-status-style "fg=#b6b8bb"
setw -g window-status-current-style "fg=#f2f4f8,bold"
setw -g window-status-separator " "

set -g status-left-length 50
set -g status-right-length 100
set -g status-left " #[fg=#78a9ff,bold]#S #[fg=#353535]#[bg=#161616]"
set -g status-right ""

set -g popup-border-lines rounded
set -g popup-border-style "fg=#54546d,bg=#1f1f28"

# --- Hooks ---
set-hook -g session-created "run-shell '$HOME/.config/tmux/scripts/rename-new-session.sh'"

# --- Prefix ---
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# --- Windows / sessions ---
bind n new-window -c "#{pane_current_path}"
bind C new-session -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind d detach-client
bind q kill-session

bind h previous-window
bind l next-window

bind -n M-H previous-window
bind -n M-L next-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# --- Panes / splits ---
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Copy mode ---
bind [ copy-mode
bind Escape copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel '$HOME/.config/tmux/scripts/copy-to-system.sh'
bind -T copy-mode-vi Escape send -X cancel

# --- Scripts: fzf / tools ---
bind s display-popup -w 80% -h 60% -E '$HOME/.config/tmux/scripts/fzf-switch-session.sh'
bind w display-popup -w 80% -h 60% -E '$HOME/.config/tmux/scripts/fzf-switch-window.sh'
bind ? display-popup -w 90% -h 85% -E '$HOME/.config/tmux/scripts/fzf-list-keys.sh'

bind f display-popup -d "#{pane_current_path}" -w 75% -h 65% -E '$HOME/.config/tmux/scripts/worktree-new.sh'
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
