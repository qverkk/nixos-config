bind s display-popup -w 80% -h 60% -E "\
    tmux list-sessions -F '#{session_name}' | grep -v \"^$(tmux display-message -p '#S')\$\" | \
    fzf --reverse --ansi --height 100% \
        --prompt='  ' \
        --header='Active Sessions' \
				--pointer='' \
        --color='bg+:#2d4f67,bg:#1f1f28,spinner:#ff9e3b,hl:#c34043' \
        --color='fg:#dcd7ba,gutter:#1f1f28,header:#938aa9,info:#7e9cd8,pointer:#7fb4ca' \
        --color='marker:#98bb6c,fg+:#dcd7ba,prompt:#76946a,hl+:#c34043' \
        --preview 'tmux capture-pane -ep -t {}' \
        --preview-window='right:75%:border-left' \
        --border='none' \
				--bind '?:toggle-preview' \
				--bind 'ctrl-d:preview-page-down,ctrl-u:preview-page-up' \
    | xargs tmux switch-client -t" 
bind w display-popup -w 80% -h 60% -E "\
    tmux list-windows -F '#{window_index} - #{window_name}' | \
    grep -v \"^$(tmux display-message -p '#I')\" | \
    fzf --reverse --ansi --height 100% \
        --prompt='󰖲  ' \
        --header='Current Session Windows' \
        --pointer='' \
        --color='bg+:#2d4f67,bg:#1f1f28,spinner:#ff9e3b,hl:#c34043' \
        --color='fg:#dcd7ba,gutter:#1f1f28,header:#938aa9,info:#7e9cd8,pointer:#7fb4ca' \
        --color='marker:#98bb6c,fg+:#dcd7ba,prompt:#76946a,hl+:#c34043' \
        --preview 'tmux capture-pane -ep -t {1}' \
        --preview-window='right:65%:border-left' \
        --border='none' \
        --bind '?:toggle-preview' \
        --bind 'ctrl-d:preview-page-down,ctrl-u:preview-page-up' \
    | cut -d ' ' -f 1 | xargs tmux select-window -t"

